---
name: Test force patch version in noop mode

on:
  workflow_dispatch:

jobs:
  test-force-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "test@example.com"
          git config user.name "Test User"

      - name: Create initial tag for semantic-release baseline
        run: |
          git tag v1.0.0 HEAD || true

      - id: action
        uses: .
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: tests/fixtures/psr-project
          no_operation_mode: "true"
          force: "patch"
          commit: "false"
          tag: "false"
          push: "false"
          changelog: "false"
          vcs_release: "false"
          git_committer_name: "Test User"
          git_committer_email: "test@example.com"

      - name: Assert version output is set
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: expected version output to be non-empty"
            exit 1
          fi
          echo "PASS: version output is set to '$VERSION'"

      - name: Assert released output is set
        env:
          RELEASED: ${{ steps.action.outputs.released }}
        run: |
          echo "released: $RELEASED"
          if [ -z "$RELEASED" ]; then
            echo "FAIL: expected released output to be non-empty"
            exit 1
          fi
          echo "PASS: released output is '$RELEASED'"

      - name: Assert tag output is set
        env:
          TAG: ${{ steps.action.outputs.tag }}
        run: |
          echo "tag: $TAG"
          if [ -z "$TAG" ]; then
            echo "FAIL: expected tag output to be non-empty"
            exit 1
          fi
          echo "PASS: tag output is '$TAG'"
