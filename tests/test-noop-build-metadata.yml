name: Test noop with build and build_metadata inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_token: fake-token-for-noop
          no_operation_mode: "true"
          build: "false"
          build_metadata: "local.1"
      - name: Assert released output exists
        env:
          RELEASED: ${{ steps.action.outputs.released }}
        run: |
          echo "released: $RELEASED"
          if [ -z "$RELEASED" ] && [ "$RELEASED" != "false" ] && [ "$RELEASED" != "true" ]; then
            echo "FAIL: expected released output to be set"
            exit 1
          fi
          echo "PASS"
