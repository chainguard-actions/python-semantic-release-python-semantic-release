---
name: Test noop mode with force minor

on:
  workflow_dispatch:

jobs:
  test-noop-force-minor:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up git identity and baseline tag
        run: |
          git config user.email "test@example.com"
          git config user.name "Test User"
          # Use a very high tag to ensure it's the latest in the repo history
          git tag v200.3.4 2>/dev/null || true

      - id: action
        uses: .
        with:
          github_token: "dummy-token-for-noop"
          config_file: "tests/fixtures/psr-config/pyproject.toml"
          no_operation_mode: "true"
          force: "minor"
          commit: "false"
          tag: "false"
          push: "false"
          vcs_release: "false"
          changelog: "false"
          verbosity: "1"

      - name: Assert version is a minor bump from 200.3.4
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if [ "$VERSION" != "200.4.0" ]; then
            echo "FAIL: expected version=200.4.0 after minor bump from 200.3.4, got '$VERSION'"
            exit 1
          fi
          echo "PASS: version=$VERSION"

      - name: Assert released output is true
        env:
          RELEASED: ${{ steps.action.outputs.released }}
        run: |
          echo "released: $RELEASED"
          if [ "$RELEASED" != "true" ]; then
            echo "FAIL: expected released=true when force=minor is set, got '$RELEASED'"
            exit 1
          fi
          echo "PASS: released=$RELEASED"

      - name: Assert previous_version output is set
        env:
          PREV_VERSION: ${{ steps.action.outputs.previous_version }}
        run: |
          echo "previous_version: $PREV_VERSION"
          if [ -z "$PREV_VERSION" ]; then
            echo "FAIL: expected previous_version to be non-empty"
            exit 1
          fi
          echo "PASS: previous_version=$PREV_VERSION"
