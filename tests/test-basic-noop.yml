---
name: Test basic noop mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          git_committer_name: "Test Bot"
          git_committer_email: "testbot@example.com"
          no_operation_mode: "true"
          verbosity: "1"
      - name: Assert released output exists
        env:
          RELEASED: ${{ steps.action.outputs.released }}
        run: |
          echo "released: $RELEASED"
          if [ -z "$RELEASED" ]; then
            echo "FAIL: expected 'released' output to be set"
            exit 1
          fi
          echo "PASS"
      - name: Assert version output exists
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          echo "PASS: version output is present (may be empty if no release)"
