name: Test basic noop mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: action
        uses: .
        with:
          github_token: fake-token-for-noop
          git_committer_name: "Test Bot"
          git_committer_email: "testbot@example.com"
          no_operation_mode: "true"
          verbosity: "1"
          push: "false"
          commit: "false"
          tag: "false"
          changelog: "false"
          vcs_release: "false"
          build: "false"
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "released: ${{ steps.action.outputs.released }}"
          echo "version: ${{ steps.action.outputs.version }}"
          echo "Action completed (noop mode)"
          echo "PASS"
