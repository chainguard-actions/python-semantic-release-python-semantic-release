---
name: Test prerelease mode in noop

on:
  workflow_dispatch:

jobs:
  test-prerelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "test@example.com"
          git config user.name "Test User"

      - name: Create initial tag and a feature commit for semantic-release baseline
        run: |
          git tag v1.0.0 HEAD || true

      - id: action
        uses: .
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: tests/fixtures/psr-project
          no_operation_mode: "true"
          prerelease: "true"
          prerelease_token: "alpha"
          force: "minor"
          commit: "false"
          tag: "false"
          push: "false"
          changelog: "false"
          vcs_release: "false"
          git_committer_name: "Test User"
          git_committer_email: "test@example.com"

      - name: Assert version output is set
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: expected version output to be non-empty"
            exit 1
          fi
          echo "PASS: version output is set to '$VERSION'"

      - name: Assert is_prerelease output is true
        env:
          IS_PRERELEASE: ${{ steps.action.outputs.is_prerelease }}
        run: |
          echo "is_prerelease: $IS_PRERELEASE"
          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "FAIL: expected is_prerelease to be 'true', got '$IS_PRERELEASE'"
            exit 1
          fi
          echo "PASS: is_prerelease is 'true' as expected"

      - name: Assert version contains prerelease token
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if ! echo "$VERSION" | grep -q "alpha"; then
            echo "FAIL: expected version '$VERSION' to contain 'alpha' prerelease token"
            exit 1
          fi
          echo "PASS: version contains 'alpha' prerelease token"
