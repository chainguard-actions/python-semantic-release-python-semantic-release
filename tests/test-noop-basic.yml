---
name: Test basic noop mode

on:
  workflow_dispatch:

jobs:
  test-noop-basic:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up git identity and baseline tag
        run: |
          git config user.email "test@example.com"
          git config user.name "Test User"
          # Use a very high tag to ensure it's the latest in the repo history
          git tag v999.0.0 2>/dev/null || true

      - id: action
        uses: .
        with:
          github_token: "dummy-token-for-noop"
          config_file: "tests/fixtures/psr-config/pyproject.toml"
          no_operation_mode: "true"
          commit: "false"
          tag: "false"
          push: "false"
          vcs_release: "false"
          changelog: "false"
          verbosity: "1"

      - name: Assert version output is set
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: expected version output to be non-empty"
            exit 1
          fi
          echo "PASS: version=$VERSION"

      - name: Assert released output is set
        env:
          RELEASED: ${{ steps.action.outputs.released }}
        run: |
          echo "released: $RELEASED"
          if [ "$RELEASED" != "true" ] && [ "$RELEASED" != "false" ]; then
            echo "FAIL: expected released to be 'true' or 'false', got '$RELEASED'"
            exit 1
          fi
          echo "PASS: released=$RELEASED"

      - name: Assert is_prerelease output is set
        env:
          IS_PRERELEASE: ${{ steps.action.outputs.is_prerelease }}
        run: |
          echo "is_prerelease: $IS_PRERELEASE"
          if [ "$IS_PRERELEASE" != "true" ] && [ "$IS_PRERELEASE" != "false" ]; then
            echo "FAIL: expected is_prerelease to be 'true' or 'false', got '$IS_PRERELEASE'"
            exit 1
          fi
          echo "PASS: is_prerelease=$IS_PRERELEASE"
