---
name: Test SSH signing key inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          no_operation_mode: "true"
          ssh_public_signing_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAITestPublicKeyForCoverageOnly test@example.com"
          ssh_private_signing_key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAA
            -----END OPENSSH PRIVATE KEY-----
      - name: Assert commit_sha output exists
        env:
          COMMIT_SHA: ${{ steps.action.outputs.commit_sha }}
        run: |
          echo "commit_sha: $COMMIT_SHA"
          echo "PASS: commit_sha output checked"
      - name: Assert release_notes output exists
        env:
          RELEASE_NOTES: ${{ steps.action.outputs.release_notes }}
        run: |
          echo "release_notes: $RELEASE_NOTES"
          echo "PASS: release_notes output checked"
