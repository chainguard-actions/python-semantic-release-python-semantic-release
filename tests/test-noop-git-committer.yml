---
name: Test noop mode with custom git committer

on:
  workflow_dispatch:

jobs:
  test-noop-git-committer:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up git identity and baseline tag
        run: |
          git config user.email "test@example.com"
          git config user.name "Test User"
          # Use a very high tag to ensure it's the latest in the repo history
          git tag v50.1.0 2>/dev/null || true

      - id: action
        uses: .
        with:
          github_token: "dummy-token-for-noop"
          config_file: "tests/fixtures/psr-config/pyproject.toml"
          no_operation_mode: "true"
          force: "patch"
          git_committer_name: "Release Bot"
          git_committer_email: "release-bot@example.com"
          commit: "false"
          tag: "false"
          push: "false"
          vcs_release: "false"
          changelog: "false"
          verbosity: "1"

      - name: Assert version output is set
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: expected version output to be non-empty"
            exit 1
          fi
          echo "PASS: version=$VERSION"

      - name: Assert released is true
        env:
          RELEASED: ${{ steps.action.outputs.released }}
        run: |
          echo "released: $RELEASED"
          if [ "$RELEASED" != "true" ]; then
            echo "FAIL: expected released=true when force=patch is set, got '$RELEASED'"
            exit 1
          fi
          echo "PASS: released=$RELEASED"

      - name: Assert version is patch bump from 50.1.0
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if [ "$VERSION" != "50.1.1" ]; then
            echo "FAIL: expected version=50.1.1 after patch bump from 50.1.0, got '$VERSION'"
            exit 1
          fi
          echo "PASS: version=$VERSION"
